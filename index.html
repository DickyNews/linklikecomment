<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dicky News | YouTube Task Unlocker</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #050505;
            --accent: #ff0000;
            --text: #ffffff;
            --success: #00ff88;
        }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', sans-serif; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle at 50% 50%, #1a0000 0%, #000 100%);
        }

        .card {
            width: 90%; max-width: 360px;
            background: rgba(255,255,255,0.03); backdrop-filter: blur(15px);
            padding: 35px 25px; border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        .icon-box { font-size: 50px; color: var(--accent); margin-bottom: 15px; }
        h2 { font-size: 16px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }

        input {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333;
            background: #000; color: #fff; margin-bottom: 15px; outline: none;
        }

        .btn {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }

        .btn-gen { background: #fff; color: #000; }
        .btn-unlock { background: var(--accent); color: #fff; }
        .btn-waiting { background: #222; color: #666; cursor: wait; }
        .btn-done { background: var(--success); color: #000; box-shadow: 0 0 15px var(--success); }

        #resultArea { 
            margin-top: 20px; padding: 10px; border: 1px dashed #555; 
            border-radius: 10px; font-size: 11px; word-break: break-all; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="card" id="card">
    </div>

<script>
    const params = new URLSearchParams(window.location.search);
    const box = document.getElementById('card');

    // --- 1. MODE GENERATOR ---
    if (!params.get("v")) {
        box.innerHTML = `
            <div class="icon-box"><i class="fas fa-link"></i></div>
            <h2>BUAT LINK MISI</h2>
            <input type="text" id="linkInp" placeholder="Masukkan Link Video YouTube...">
            <button class="btn btn-gen" onclick="generate()">GENERATE</button>
            <div id="resultArea" style="display:none" onclick="copy()"></div>
        `;

        window.generate = () => {
            const val = document.getElementById('linkInp').value;
            if(!val) return alert("Masukkan link dulu!");
            const encoded = btoa(val).replace(/=+$/, '').replace(/\+/g, '-').replace(/\//g, '_');
            const final = window.location.origin + window.location.pathname + "?v=" + encoded;
            const res = document.getElementById('resultArea');
            res.innerText = final;
            res.style.display = 'block';
            alert("Berhasil! Klik kotak di bawah untuk copy.");
        }

        window.copy = () => {
            navigator.clipboard.writeText(document.getElementById('resultArea').innerText);
            alert("Link disalin!");
        }
    } 

    // --- 2. MODE UNLOCKER ---
    else {
        const ytTarget = atob(params.get("v").replace(/-/g, '+').replace(/_/g, '/'));
        box.innerHTML = `
            <div class="icon-box"><i class="fab fa-youtube"></i></div>
            <h2>MISI LIKE & KOMEN</h2>
            <p style="font-size:12px; color:#888; margin-bottom:20px;">Link akan terbuka otomatis setelah 15 detik misi berjalan.</p>
            <button id="btnAction" class="btn btn-unlock" onclick="startMisi('${ytTarget}')">
                MULAI MISI
            </button>
        `;

        window.startMisi = (link) => {
            const btn = document.getElementById('btnAction');
            window.open(link, "_blank");

            btn.disabled = true;
            btn.className = "btn btn-waiting";
            
            let time = 15;
            const timer = setInterval(() => {
                btn.innerText = `MENGECEK... ${time}s`;
                time--;

                if(time < 0) {
                    clearInterval(timer);
                    btn.disabled = false;
                    btn.className = "btn btn-done";
                    btn.innerText = "MISI SELESAI!";
                    // Setelah selesai, bisa diarahkan balik ke video atau pesan sukses
                    btn.onclick = () => alert("Misi Selesai! Terima kasih dukungannya.");
                }
            }, 1000);
        }
    }
</script>

</body>
</html>
