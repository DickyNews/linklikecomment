<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dicky News | YouTube Task Unlocker</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #050505;
            --accent: #ff0000;
            --text: #ffffff;
            --success: #00ff88;
            --warning: #ffcc00;
        }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', sans-serif; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle at 50% 50%, #1a0000 0%, #000 100%);
        }

        .card {
            width: 90%; max-width: 360px;
            background: rgba(255,255,255,0.03); backdrop-filter: blur(15px);
            padding: 35px 25px; border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .icon-box { font-size: 50px; color: var(--accent); margin-bottom: 15px; }
        h2 { font-size: 16px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; line-height: 1.4; }
        p.desc { font-size: 13px; color: #bbb; margin-bottom: 25px; padding: 0 10px; }

        input {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333;
            background: #000; color: #fff; margin-bottom: 15px; outline: none; box-sizing: border-box;
        }

        .btn {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            font-weight: bold; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; font-size: 14px;
        }

        .btn-gen { background: #fff; color: #000; }
        .btn-unlock { background: var(--accent); color: #fff; }
        .btn-waiting { background: #222; color: #888; cursor: wait; border: 1px solid #444; }
        .btn-retry { background: var(--warning); color: #000; }
        .btn-done { background: var(--success); color: #000; box-shadow: 0 0 15px var(--success); }

        #resultArea { 
            margin-top: 20px; padding: 10px; border: 1px dashed #555; 
            border-radius: 10px; font-size: 11px; word-break: break-all; cursor: pointer;
        }

        #statusMsg { font-size: 12px; margin-top: 15px; min-height: 18px; }
    </style>
</head>
<body>

<div class="card" id="card"></div>

<script>
    const params = new URLSearchParams(window.location.search);
    const box = document.getElementById('card');
    const FINAL_LINK = "https://dickynews.github.io/download/"; // Link tujuan akhir
    let attempt = 1;

    // --- 1. MODE GENERATOR ---
    if (!params.get("v")) {
        box.innerHTML = `
            <div class="icon-box"><i class="fas fa-link"></i></div>
            <h2>BUAT LINK MISI</h2>
            <input type="text" id="linkInp" placeholder="Masukkan Link Video YouTube...">
            <button class="btn btn-gen" onclick="generate()">GENERATE</button>
            <div id="resultArea" style="display:none" onclick="copy()"></div>
        `;

        window.generate = () => {
            const val = document.getElementById('linkInp').value;
            if(!val) return alert("Masukkan link dulu!");
            const encoded = btoa(val).replace(/=+$/, '').replace(/\+/g, '-').replace(/\//g, '_');
            const final = window.location.origin + window.location.pathname + "?v=" + encoded;
            const res = document.getElementById('resultArea');
            res.innerText = final;
            res.style.display = 'block';
            alert("Berhasil! Klik kotak di bawah untuk copy.");
        }

        window.copy = () => {
            navigator.clipboard.writeText(document.getElementById('resultArea').innerText);
            alert("Link disalin!");
        }
    } 

    // --- 2. MODE UNLOCKER ---
    else {
        const ytTarget = atob(params.get("v").replace(/-/g, '+').replace(/_/g, '/'));
        
        box.innerHTML = `
            <div class="icon-box"><i class="fab fa-youtube"></i></div>
            <h2>VERIFIKASI TUGAS</h2>
            <p class="desc" id="instruction">Silahkan <b>Like & Berikan Komentar</b> pada video berikut agar link terbuka.</p>
            <button id="btnAction" class="btn btn-unlock" onclick="handleMission('${ytTarget}')">
                MULAI MISI
            </button>
            <div id="statusMsg"></div>
        `;

        window.handleMission = (videoLink) => {
            const btn = document.getElementById('btnAction');
            const status = document.getElementById('statusMsg');

            // Buka tab YouTube
            window.open(videoLink, "_blank");

            // Setup Timer
            btn.disabled = true;
            btn.className = "btn btn-waiting";
            status.innerText = "Mengecek interaksi...";
            status.style.color = "#888";
            
            let time = 15;
            const timer = setInterval(() => {
                btn.innerText = `PROSES... ${time}s`;
                time--;

                if(time < 0) {
                    clearInterval(timer);
                    
                    if(attempt === 1) {
                        // Gagalkan percobaan pertama
                        btn.disabled = false;
                        btn.className = "btn btn-retry";
                        btn.innerText = "ULANGI MISI";
                        status.innerText = "Gagal: Interaksi tidak ditemukan. Silahkan Like & Komen dengan benar.";
                        status.style.color = "var(--warning)";
                        attempt = 2;
                    } else {
                        // Berhasil pada percobaan kedua
                        btn.disabled = true;
                        btn.className = "btn btn-done";
                        btn.innerText = "VERIFIKASI BERHASIL!";
                        status.innerText = "Tugas selesai! Mengalihkan ke link download...";
                        status.style.color = "var(--success)";
                        
                        // Redirect ke link download setelah 2 detik
                        setTimeout(() => {
                            window.location.href = FINAL_LINK;
                        }, 2000);
                    }
                }
            }, 1000);
        }
    }
</script>

</body>
</html>
