<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dicky News | Premium Unlocker</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.4);
            --accent: #007AFF; 
            --yt-red: #FF3B30; 
            --success: #34C759; 
            --warning: #FF9500; 
            --text: #1d1d1f;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh; display: flex; align-items: center; justify-content: center;
            overflow: hidden; color: var(--text);
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
        }

        #space-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
        }

        .card {
            width: 90%; max-width: 380px;
            background: var(--glass);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            padding: 40px 25px;
            border-radius: 35px;
            border: 1px solid var(--glass-border);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            animation: floating 6s ease-in-out infinite;
            z-index: 10;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        .icon-wrapper {
            width: 80px; height: 80px;
            background: white; border-radius: 22px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            font-size: 40px; color: var(--yt-red);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.4); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(255, 59, 48, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); }
        }

        .pulse-btn { animation: pulse-red 1.5s infinite; }

        @keyframes pulse-red {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.5); }
            70% { transform: scale(1.03); box-shadow: 0 0 0 15px rgba(255, 59, 48, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); }
        }

        h2 { font-size: 22px; font-weight: 700; margin: 10px 0; letter-spacing: -0.5px; }
        p.desc { font-size: 14px; color: #444; line-height: 1.5; margin-bottom: 30px; }

        .btn {
            width: 100%; padding: 18px; border-radius: 18px; border: none;
            font-weight: 600; font-size: 14px; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; justify-content: center; gap: 10px;
            text-transform: uppercase;
        }

        .btn:active { transform: scale(0.95); }
        .btn-unlock { background: var(--text); color: white; }
        .btn-waiting { background: rgba(0,0,0,0.1); color: #666; cursor: wait; }
        .btn-retry { background: var(--yt-red); color: white; }

        input {
            width: 100%; padding: 15px; border-radius: 15px; border: 1px solid rgba(0,0,0,0.1);
            background: rgba(255,255,255,0.5); margin-bottom: 15px; font-size: 14px; outline: none;
            text-align: center; font-weight: bold; letter-spacing: 2px;
        }

        #statusMsg { font-size: 13px; margin-top: 20px; font-weight: 500; height: auto; transition: 0.3s; }

        #resultArea {
            margin-top: 20px; padding: 15px; background: white; border-radius: 12px;
            font-size: 11px; word-break: break-all; border: 1px dashed #ccc; cursor: copy;
        }
    </style>
</head>
<body>

<canvas id="space-canvas"></canvas>

<div class="card" id="card"></div>

<script>
    // --- SPACE BACKGROUND ENGINE ---
    const canvas = document.getElementById('space-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function initCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        particles = [];
        for (let i = 0; i < 100; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 2,
                speed: Math.random() * 0.5 + 0.1
            });
        }
    }

    function drawParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "rgba(255, 255, 255, 0.5)";
        particles.forEach(p => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fill();
            p.y -= p.speed;
            if (p.y < 0) p.y = canvas.height;
        });
        requestAnimationFrame(drawParticles);
    }
    window.addEventListener('resize', initCanvas);
    initCanvas();
    drawParticles();

    // --- LOGIC GATEKEEPER ---
    const params = new URLSearchParams(window.location.search);
    const box = document.getElementById('card');
    
    // Alamat Web 2 kamu (Unlocker Utama)
    const WEB_2_URL = "https://dickynews.github.io/linkdickynews/";

    let attempt = 1;

    if (!params.get("v")) {
        // --- MODE GENERATOR ---
        box.innerHTML = `
            <div class="icon-wrapper" style="color:var(--accent)"><i class="fas fa-plus"></i></div>
            <h2>Buat Link Tugas</h2>
            <input type="text" id="linkInp" placeholder="Link Web 2 / Link Download...">
            <input type="number" id="pinInp" placeholder="Set PIN 4 Digit" maxlength="4">
            <button class="btn btn-unlock" onclick="generate()">Generate Link</button>
            <div id="resultArea" style="display:none" onclick="copy()"></div>
            <p style="font-size:10px; margin-top:10px; color:#666;">*Jika targetnya Web 2, otomatis bypass misi di sana.</p>
        `;

        window.generate = () => {
            const val = document.getElementById('linkInp').value;
            const pin = document.getElementById('pinInp').value;
            if(!val || !pin || pin.length !== 4) { alert("Isi link dan PIN 4 digit!"); return; }
            
            const data = JSON.stringify({ l: val, p: pin });
            const encoded = btoa(data).replace(/=+$/, '').replace(/\+/g, '-').replace(/\//g, '_');
            const final = window.location.origin + window.location.pathname + "?v=" + encoded;
            const res = document.getElementById('resultArea');
            res.innerText = final; res.style.display = 'block';
        }

        window.copy = () => {
            navigator.clipboard.writeText(document.getElementById('resultArea').innerText);
            alert("Tersalin!");
        }
    } 
    else {
        // --- MODE VERIFIKASI ---
        const decoded = JSON.parse(atob(params.get("v").replace(/-/g, '+').replace(/_/g, '/')));
        const targetLink = decoded.l;
        const requiredPin = decoded.p;
        
        box.innerHTML = `
            <div class="icon-wrapper"><i class="fab fa-youtube"></i></div>
            <h2>Verifikasi Video</h2>
            <p class="desc">Silahkan <b>Tonton, Like & Comment</b> pada video di YouTube untuk mendapatkan PIN pembuka.</p>
            <button id="btnAction" class="btn btn-unlock" onclick="handleMission()">
                MULAI TUGAS
            </button>
            <div id="statusMsg"></div>
        `;

        window.handleMission = () => {
            const btn = document.getElementById('btnAction');
            const status = document.getElementById('statusMsg');

            // Buka video YT (Asumsikan link yang di-generate adalah link video YT)
            // Atau jika targetLink adalah video, kita buka targetLink.
            window.open("https://youtube.com/@dickynews", "_blank"); 

            btn.disabled = true;
            btn.className = "btn btn-waiting";
            status.innerText = "Memverifikasi interaksi...";
            
            let time = 15;
            const timer = setInterval(() => {
                btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Mengecek ${time}s`;
                time--;

                if(time < 0) {
                    clearInterval(timer);
                    if(attempt === 1) {
                        btn.disabled = false;
                        btn.className = "btn btn-retry pulse-btn";
                        btn.innerText = "ULANGI TUGAS";
                        status.innerHTML = "<b style='color:var(--yt-red)'>Gagal!</b> Klik ulang dan pastikan sudah interaksi.";
                        attempt = 2;
                    } else {
                        btn.style.display = "none";
                        status.innerHTML = `
                            <input type="number" id="pinInput" placeholder="Masukkan PIN 4 Digit" maxlength="4">
                            <button class="btn btn-unlock" onclick="verifyPin('${targetLink}', '${requiredPin}')">BUKA LINK SEKARANG</button>
                        `;
                    }
                }
            }, 1000);
        }

        window.verifyPin = (target, reqPin) => {
            const input = document.getElementById('pinInput').value;
            const status = document.getElementById('statusMsg');
            
            if(input === reqPin) {
                status.innerText = "PIN Benar! Mengalihkan...";
                status.style.color = "var(--success)";
                
                // --- LOGIKA BYPASS OTOMATIS ---
                let finalDestination = target;
                if(target.includes("linkdickynews")) {
                    // Jika link tujuan adalah Web 2, tambahkan parameter bypass
                    finalDestination = target + "&method=bypass";
                }

                setTimeout(() => { window.location.href = finalDestination; }, 1500);
            } else {
                alert("PIN Salah! Cek komentar video lagi.");
            }
        }
    }
</script>

</body>
</html>
